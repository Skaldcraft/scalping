# config/settings.yaml
# =====================
# Precision Scalping Utility — Configuration File
#
# All parameters are editable here without touching any code.
# The version field is stamped into every results folder for traceability.
# Update the version string whenever you change the strategy logic or
# parameters so that result sets remain comparable.

version: "1.0"

account:
  starting_capital:     10000      # USD
  risk_per_trade_pct:   1.0        # % of current equity risked per trade
  daily_loss_limit_pct: 5.0        # halt trading if daily loss exceeds this %

session:
  start_time: "09:30"              # New York market open
  end_time:   "11:00"              # Hard gate for new entries (90 min window)
  timezone:   "America/New_York"

opening_range:
  candle_size_minutes: 15          # 5 or 15 — user-selectable

strategy:
  atr_period:                14    # Lookback period for ATR calculation
  manipulation_threshold_pct: 25.0 # OR range >= this % of ATR → manipulation mode
  reward_ratios: [2, 3]            # Both targets tracked and compared
  trend_mode:
    allow_displacement_gap_entry: true
    # retest_first | gap_first
    entry_priority: retest_first
    # Option A: gap must be >= N% of ATR14 to qualify (0 = disabled)
    displacement_min_atr_pct: 3.0
    # Option B: gap bar body must occupy >= N% of its total range (0 = disabled)
    displacement_min_body_pct: 60.0

risk:
  profit_factor_floor:          1.5  # Halt if PF drops below this
  min_trades_before_pf_check:   10   # Minimum trades before PF circuit breaker activates

weekly_review:
  enabled: true
  min_trades_for_setup_review: 10
  good_win_rate_pct: 60.0
  mixed_win_rate_pct: 45.0
  good_profit_factor: 1.5
  mixed_profit_factor: 1.0
  good_drawdown_pct: 3.0
  mixed_drawdown_pct: 5.0

long_view:
  enabled: true
  recent_weeks_to_show: 8

instruments:
  equities:
    - AAPL
    - NVDA
    - AMZN
    - QQQ
    - SPY
  # Forex: place your OHLCV CSV files in data_files/ and add entries below.
  # Expected CSV columns (case-insensitive): timestamp, open, high, low, close, volume
  # Timestamps should be in ISO 8601 format, America/New_York timezone preferred.
  forex_csv_files: {}
  # Example:
  #   EURUSD: "data_files/EURUSD_5min.csv"
  #   GBPUSD: "data_files/GBPUSD_5min.csv"

pre_session:
  enabled: true
  run_time_et: "09:25"
  top_n: 3
  freeze_daily_selection: true
  # Optional path for frozen daily selection snapshots.
  # Default: results/_selection_state
  frozen_selection_dir: null
  fallback_to_config_instruments: true
  # Fixed tracked universe used by the pre-session selector.
  # Symbols are Yahoo-compatible so the selector/backtester can fetch them directly.
  universe:
    - {symbol: "META", asset_class: "equity"}
    - {symbol: "AMZN", asset_class: "equity"}
    - {symbol: "AAPL", asset_class: "equity"}
    - {symbol: "NFLX", asset_class: "equity"}
    - {symbol: "GOOGL", asset_class: "equity"}
    - {symbol: "NVDA", asset_class: "equity"}
    - {symbol: "TSLA", asset_class: "equity"}
    - {symbol: "MSFT", asset_class: "equity"}
    - {symbol: "QQQ", asset_class: "index"}
    - {symbol: "SPY", asset_class: "index"}
    - {symbol: "EURUSD=X", asset_class: "forex"}
    - {symbol: "GBPUSD=X", asset_class: "forex"}
    - {symbol: "JPY=X", asset_class: "forex"}
    - {symbol: "XAUUSD=X", asset_class: "metal"}
  selection_rules:
    min_profit_factor: 1.5
    min_trades_for_pf: 10
    # If set, only the latest N trades are used in PF calculation.
    pf_lookback_trades: null
    # Preferred missing-data policies:
    # - allow: do not reject solely for missing data
    # - reject: exclude symbol when data is missing
    pf_missing_policy: allow
    spread_missing_policy: allow
    # Optional spread cap used by the selector. If null, spread is not capped.
    max_spread: null

    # Forex reliability policy (recommended production baseline)
    # ---------------------------------------------------------
    # If you want Forex symbols to remain in the tracked universe only when
    # data quality is strong, use:
    #   spread_missing_policy: reject
    #   max_spread: <pair-specific threshold>
    #   spread_overrides: {EURUSD=X: ..., GBPUSD=X: ..., JPY=X: ...}
    #
    # If you want broad inclusion while experimenting, keep:
    #   spread_missing_policy: allow
    #   max_spread: null
    #
    # In short:
    # - strict profile  -> Forex filtered unless spread data is reliable
    # - permissive profile -> Forex can stay included while data is incomplete

    # Legacy toggles (still supported for compatibility):
    require_pf_history: false
    require_spread_data: false
  # Optional manual spread map used by Phase 1 selector.
  # Example: {AAPL: 0.02, NVDA: 0.03}
  spread_overrides: {}
  # Optional overlap metadata used for tie-break ranking.
  # Example:
  # overlap_signals:
  #   AAPL: {manipulation_status: true, displacement_gap: false}
  overlap_signals: {}

commissions:
  per_trade_flat: 0.50             # Flat $ commission deducted per trade (both entry and exit combined)
